<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batalha</title>
  <link rel="stylesheet" href="style_pagina.CSS">
</head>

<body>
  <div class="pagina">
    <h1>Batalha</h1>
    <p id="turnoAtual" class="turno">Clique em Batalhar para começar</p>

    <div class="arena">
      <div id="cardJogadorUm" class="personagem">
        <img id="imgJogadorUm" src="./src/imagem2.png" alt="Guerreiro">
        <h2 id="NomeUm">Guerreiro</h2>
        <p id="JogadorUmVida">HP: 300</p>
        <div class="barra">
          <div id="barraVida" class="vida guerreiro"></div>
        </div>
        <p class="rotuloDefesa">Defesa</p>
        <div class="barra defesaBarra">
          <div id="barraDefesaUm" class="defesa"></div>
        </div>
      </div>

      <div class="vs">VS</div>

      <div id="cardJogadorDois" class="personagem">
        <img id="imgJogadorDois" src="./src/imagem1.png" alt="Mago">
        <h2 id="NomeDois">Mago</h2>
        <p id="JogadorDoisVida">HP: 240</p>
        <div class="barra">
          <div id="barraVidaDois" class="vida mago"></div>
        </div>
        <p class="rotuloDefesa">Defesa</p>
        <div class="barra defesaBarra">
          <div id="barraDefesaDois" class="defesa"></div>
        </div>
      </div>
    </div>

    <button id="Batalhar">Batalhar</button>

    <div class="comandos">
      <button id="btnAtacar" disabled>Atacar</button>
      <button id="btnDefender" disabled>Defender</button>
      <button id="btnCurar" disabled>Curar</button>
      <button id="btnPassarTurno" disabled>Próximo Turno</button>
    </div>

    <h2>Registro da batalha</h2>
    <div id="console" class="console"></div>
  </div>

  <script src="Jogo.js"></script>
</body>
</html>
